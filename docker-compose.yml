version: "3.9"

services:
  app:
    build: .
    env_file: .env
    ports: ["8501:8501"]
    depends_on:
      - postgres
      - chroma

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: assistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5434:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  chroma:
    image: chromadb/chroma:0.5.20
    ports: ["8000:8000"]
    volumes:
      - chromadata:/chroma/chroma

volumes:
  pgdata:
  chromadata:
